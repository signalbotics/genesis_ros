# Genesis TurtleBot controller_manager configuration.
# Uses a JointGroupVelocityController on the two wheel joints driven by
# the ``topic_based_ros2_control`` HW plugin.
controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    velocity_controllers:
      type: velocity_controllers/JointGroupVelocityController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

velocity_controllers:
  ros__parameters:
    use_sim_time: true
    joints:
      - left_wheel
      - right_wheel
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
