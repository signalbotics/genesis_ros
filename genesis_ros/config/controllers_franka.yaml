# Genesis Franka controller_manager configuration.
# Works against either the native genesis_ros2_control/GenesisSystem
# hardware plugin (default) or the community topic_based_ros2_control
# fallback. Node is launched under /franka, so every key uses /**
# so the yaml binds regardless of namespace.
/**/controller_manager:
  ros__parameters:
    update_rate: 200
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

/**/joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

/**/joint_trajectory_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.5
